spring:
  application:
    name: sopkathon-server-ios3
  profiles:
    default: local

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/v1
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true

object-storage:
  endpoint: ${OBJECT_STORAGE_ENDPOINT:https://kr.object.ncloudstorage.com}
  region: ${OBJECT_STORAGE_REGION:kr-standard}
  bucket: ${OBJECT_STORAGE_BUCKET:local-bucket}
  access-key: ${OBJECT_STORAGE_ACCESS_KEY:local-access-key}
  secret-key: ${OBJECT_STORAGE_SECRET_KEY:local-secret-key}
  upload-url-expiration: ${OBJECT_STORAGE_UPLOAD_URL_EXPIRATION:10m}
  download-url-expiration: ${OBJECT_STORAGE_DOWNLOAD_URL_EXPIRATION:10m}
  max-file-size: ${OBJECT_STORAGE_MAX_FILE_SIZE:10485760}
  key-prefix: ${OBJECT_STORAGE_KEY_PREFIX:images}
  allowed-content-types:
    - image/jpeg
    - image/png
    - image/heic
    - image/webp
