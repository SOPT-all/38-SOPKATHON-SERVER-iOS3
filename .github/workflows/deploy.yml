name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build -x test

      # Docker 관련 작업들은 push 시에만 실행되도록 설정
      - name: docker image build
        if: github.event_name == 'push'
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sopkathon-ios3:latest .

      # DockerHub 로그인
      - name: docker login
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker Hub 이미지 푸시
      - name: docker Hub push
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sopkathon-ios3:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to NCP Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USERNAME }}
          key: ${{ secrets.NCP_SSH_KEY }}
          password: ${{ secrets.NCP_PASSWORD }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sopkathon-ios3:latest
            sudo docker rm -f springboot || true
            sudo docker run --env-file /root/.env --name springboot -d -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/sopkathon-ios3:latest
            sudo docker image prune -f
            sleep 20
            echo "===== springboot container logs ====="
            sudo docker logs --tail 200 springboot
            if [ "$(sudo docker inspect -f '{{.State.Running}}' springboot)" != "true" ]; then
              echo "::error::springboot container is not running"
              exit 1
            fi
